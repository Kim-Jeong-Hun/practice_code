<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 시맨틱 웹 개요 
    1. 컴퓨터와 검색 엔진들이 의미 있는 (중요한) 정보를 원함. 
    2. 기존 HTML 태그들은(h1, p등) 그런 정보를 알릴 수 없음. 
    3. 문서의 구조와 의미를 표현하는 태그 추가()
    -->

    <h1>구조</h1>
    <header>머릿말</header>
    <main>메인 컨텐츠</main>
    <nav>네비게이션(하이퍼링크, 라우팅)</nav>
    <article>보조 내용이나 관련된 내용</article>
    <aside>팁 또는 메인 주제가 아닌 내용</aside>
    <footer>꼬리말(저자, 저작권 정보)</footer>

    <h2>정보</h2>
    <details>
        <summary>상세 정보(details)와 상세 정보의 제목(summary)</summary>
    </details>
    <mark>중요한 텍스트 표시</mark>
    <time>시간 정보임을 표시</time>
</body>
</html>
