<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>도형 서식 폼 만들기</h1>
    <hr />
    <fieldset>
        <legend>도형 서식 입력</legend>
        <label for="line_type">선종류</label>
        <select id="line_type">
            <option>선없음</option>
            <option>실선</option>
            <option>점선</option>
        </select>
        <br>
        <br>
        <label for="line_thickness">선두께</label>
        <input type="text" id="line_thickness" />
        <label for="line_color">선색</label>
        <input type="color" id="line_color" />
        <br>
        <br>
        <label for="opacity">투명도(0~100) : </label>
        <input type="range" id="opacity" />
    </fieldset>
</body>
</html>
